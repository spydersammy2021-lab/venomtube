<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00 VENOM | TITAN V27: UNBREAKABLE</title>
    <style>
        /* --- STREFA ZERO KOPIOWANIA (LEVEL MAX) --- */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        :root { 
            --v-red: #ff0000; 
            --v-red-glow: rgba(255, 0, 0, 0.6);
            --v-bg: #000000; 
            --v-panel: rgba(5, 5, 5, 0.9);
            --v-card: rgba(12, 12, 12, 0.95);
            --v-text: #ffffff;
            --transition-ultra: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        body { 
            background-color: var(--v-bg); 
            color: var(--v-text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
            width: 100%;
            /* ANIMOWANE TŁO GALAXY */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px);
            background-size: 550px 550px, 350px 350px;
            animation: starTravel 120s linear infinite;
        }

        @keyframes starTravel {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 550px, 590px 610px; }
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 15px var(--v-red-glow); }
            50% { box-shadow: 0 0 35px var(--v-red); }
            100% { box-shadow: 0 0 15px var(--v-red-glow); }
        }

        /* --- NAGŁÓWEK --- */
        header { 
            background: var(--v-panel); 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 60px; 
            border-bottom: 3px solid var(--v-red); 
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(20px);
            animation: neonPulse 3s infinite;
        }

        .logo {
            font-size: 45px; font-weight: 900; color: var(--v-red);
            font-family: 'Impact', sans-serif; letter-spacing: -2px;
            text-shadow: 0 0 15px var(--v-red-glow);
        }

        .status-badge {
            background: rgba(255, 0, 0, 0.15);
            color: var(--v-red);
            padding: 10px 30px;
            font-weight: 900; border-radius: 50px;
            border: 1px solid var(--v-red);
            text-transform: uppercase; font-size: 12px;
        }

        .layout { display: flex; min-height: calc(100vh - 93px); }

        /* --- PANEL BOCZNY --- */
        nav { 
            width: 320px; 
            background: var(--v-panel); 
            padding: 60px 30px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .menu-btn { 
            padding: 20px 25px; margin-bottom: 15px; 
            background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; cursor: pointer;
            transition: var(--transition-ultra);
            font-weight: 800; color: #777;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .menu-btn:hover { 
            background: white; color: black; 
            transform: translateX(15px) scale(1.05);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
        }

        #adminLock {
            margin-top: 80px; border: 2px solid var(--v-red);
            color: var(--v-red); text-align: center;
            box-shadow: 0 0 10px var(--v-red-glow);
        }
        #adminLock:hover {
            background: var(--v-red); color: white;
            box-shadow: 0 0 40px var(--v-red);
        }

        /* --- GŁÓWNA TREŚĆ --- */
        main { 
            flex-grow: 1; padding: 70px; 
            background: radial-gradient(circle at top right, rgba(40, 0, 0, 0.4), transparent);
            perspective: 2000px;
        }

        .profile-card { 
            background: var(--v-card); padding: 80px; border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; gap: 60px;
            margin-bottom: 60px; position: relative;
            transform-style: preserve-3d;
            transition: var(--transition-ultra);
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .profile-card:hover {
            transform: rotateY(-5deg) rotateX(5deg);
            border-color: var(--v-red);
            box-shadow: 0 40px 80px rgba(255, 0, 0, 0.15);
        }

        .profile-card img { 
            width: 200px; height: 200px; border-radius: 35px; 
            border: 6px solid var(--v-red); 
            box-shadow: 0 0 60px var(--v-red-glow);
            transform: translateZ(50px);
        }

        .profile-info h1 { 
            font-size: 90px; margin: 0; font-family: 'Impact', sans-serif; 
            text-shadow: 0 0 30px var(--v-red-glow);
        }
        .profile-info p { 
            color: var(--v-red); font-size: 28px; font-weight: 900; 
            letter-spacing: 5px; margin-top: 10px;
        }

        /* --- STATYSTYKI --- */
        .stats-grid { display: flex; gap: 35px; margin-bottom: 70px; }
        .stat-box { 
            background: var(--v-card); padding: 50px; 
            border-radius: 30px; border-bottom: 8px solid var(--v-red);
            flex: 1; transition: var(--transition-ultra);
            transform-style: preserve-3d;
        }
        .stat-box:hover { 
            transform: translateY(-20px) scale(1.05); 
            background: #111; box-shadow: 0 25px 50px rgba(255,0,0,0.2);
        }
        .stat-box h2 { font-size: 70px; margin: 0; font-family: 'Impact', sans-serif; transform: translateZ(30px); }
        .stat-box p { color: #555; font-weight: 800; text-transform: uppercase; transform: translateZ(15px); }

        /* --- WIDEO --- */
        .video-container { 
            width: 600px; background: var(--v-card); border-radius: 30px; 
            overflow: hidden; cursor: pointer; border: 1px solid #222;
            transition: var(--transition-ultra);
            position: relative;
        }
        .video-container:hover { 
            transform: scale(1.05); border-color: var(--v-red);
            box-shadow: 0 0 50px var(--v-red-glow);
        }
        .video-container img { width: 100%; transition: 0.5s; }
        .video-container:hover img { transform: scale(1.1); }

        /* --- OVERLAY ODTWARZACZA --- */
        #playerOverlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.98); 
            z-index: 9999; align-items: center; justify-content: center; 
            backdrop-filter: blur(25px);
        }
        .video-wrapper { 
            width: 85%; aspect-ratio: 16/9; border: 5px solid var(--v-red); 
            position: relative; border-radius: 20px; overflow: hidden;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-btn { 
            position: absolute; top: -90px; right: 0; background: white; 
            color: black; border: none; padding: 15px 60px; 
            font-weight: 900; cursor: pointer; border-radius: 50px;
        }

        /* --- BLOKADA EKRANU (KOMUNIKAT) --- */
        #securityAlert {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.9); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; font-family: 'Impact', sans-serif; text-align: center;
        }
    </style>
</head>

<body oncontextmenu="return triggerSecurity(event)">

<div id="securityAlert">
    <h1 style="font-size: 100px;">BLOKADA VENOM</h1>
    <p style="font-size: 30px;">PRÓBA KOPIOWANIA KODU WYKRYTA I ZABLOKOWANA</p>
    <button onclick="hideAlert()" style="margin-top: 50px; padding: 20px 60px; font-weight: 900; cursor: pointer;">POWRÓT</button>
</div>

<header>
    <div class="logo">00VENOM</div>
    <div class="status-badge">PROTECTION ACTIVE V27.0</div>
</header>

<div class="layout">
    <nav>
        <div class="menu-btn">Główna</div>
        <div class="menu-btn">Projekty</div>
        <div class="menu-btn">Sociale</div>
        <div class="menu-btn" id="adminLock" onclick="adminAccess()">Zaloguj Admina</div>
    </nav>

    <main>
        <div class="profile-card">
            <img src="pro.png" alt="">
            <div class="profile-info">
                <h1>00 Venom</h1>
                <p>KING OF RIVALS</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><h2>107 705</h2><p>Wyświetlenia</p></div>
            <div class="stat-box"><h2>394</h2><p>Suby</p></div>
        </div>

        <div class="video-container" onclick="openPlayer('5VoQrhNo_s0')">
            <img src="https://i.ytimg.com/vi/5VoQrhNo_s0/maxresdefault.jpg">
            <div style="padding: 35px;">
                <h3 style="font-size: 26px; margin: 0;">PORADNIK RIVALS 🔥</h3>
                <p style="color: #666; margin-top: 10px;">39 wyświetleń • 2026</p>
            </div>
        </div>
    </main>
</div>

<div id="playerOverlay">
    <div class="video-wrapper">
        <button class="close-btn" onclick="closePlayer()">ZAMKNIJ SYSTEM</button>
        <iframe id="ytFrame" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
    // --- ZAAWANSOWANE ZABEZPIECZENIA ---

    // 1. Blokada skrótów klawiszowych (Ctrl+U, F12, Ctrl+Shift+I, Ctrl+C)
    document.addEventListener('keydown', function(e) {
        if (
            e.keyCode == 123 || // F12
            (e.ctrlKey && e.shiftKey && e.keyCode == 73) || // Ctrl+Shift+I
            (e.ctrlKey && e.keyCode == 85) || // Ctrl+U
            (e.ctrlKey && e.keyCode == 67)    // Ctrl+C
        ) {
            triggerSecurity(e);
        }
    });

    // 2. Blokada Prawego Przycisku Myszy
    function triggerSecurity(e) {
        e.preventDefault();
        document.getElementById('securityAlert').style.display = 'flex';
        return false;
    }

    function hideAlert() {
        document.getElementById('securityAlert').style.display = 'none';
    }

    // --- LOGIKA ODTWARZACZA ---
    function openPlayer(id) {
        document.getElementById('ytFrame').src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('playerOverlay').style.display = 'flex';
    }
    function closePlayer() {
        document.getElementById('playerOverlay').style.display = 'none';
        document.getElementById('ytFrame').src = "";
    }

    // --- ADMIN PANEL ---
    function adminAccess() {
        let pass = prompt("PODAJ KLUCZ:");
        if (pass === "skibidimasło") {
            window.location.href = "https://studio.youtube.com/";
        } else {
            alert("ODMOWA DOSTĘPU!");
        }
    }

    // 3. Blokada Inspekcji Elementu przez przeciąganie
    document.ondragstart = function() { return false; };
</script>

</body>
</html>
