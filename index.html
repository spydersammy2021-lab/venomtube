<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 SKIBIDIZIOM | RED EDITION</title>
    <style>
        :root { --v-red: #ff0000; --v-dark-red: #880000; --v-black: #050505; }
        
        body { background-color: var(--v-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* Animacja wejścia elementów */
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .animate { animation: slideIn 0.6s ease-out; }

        header { background: rgba(0,0,0,0.95); height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 2px solid var(--v-red); box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: 900; color: var(--v-red); text-shadow: 0 0 15px rgba(255,0,0,0.6); }

        nav { width: 240px; background: #080808; height: 100vh; position: fixed; top: 75px; padding: 25px; border-right: 1px solid #1a1a1a; box-sizing: border-box; }
        .nav-item { padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; color: #777; transition: 0.3s; font-weight: bold; }
        .nav-item:hover { background: rgba(255,0,0,0.1); color: white; border-left: 4px solid var(--v-red); }

        main { margin-left: 240px; margin-top: 100px; padding: 35px; }

        /* Profil i Twoja Ikonka */
        .profile-section { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; background: #0f0f0f; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--v-red); box-shadow: 0 0 20px rgba(255,0,0,0.4); object-fit: cover; }
        .user-info h1 { margin: 0; font-size: 30px; }
        .user-info p { margin: 5px 0 0 0; color: #666; font-size: 14px; }

        /* Statystyki */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-box { background: #111; padding: 20px; border-radius: 15px; border-bottom: 3px solid var(--v-red); text-align: center; }
        .stat-box h2 { margin: 0; font-size: 32px; color: white; }
        .stat-box p { margin: 5px 0 0 0; color: var(--v-red); font-size: 12px; font-weight: 900; }

        /* Karty Filmów */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .v-card { background: #0d0d0d; border-radius: 18px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .v-card:hover { transform: scale(1.02); border-color: var(--v-red); }
        .thumb { width: 100%; aspect-ratio: 16/9; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-info { padding: 18px; display: flex; gap: 15px; }
        .v-title { margin: 0; font-size: 17px; font-weight: 700; color: #fff; }

        /* Odtwarzacz */
        #v-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; }
        .video-container { width: 85%; max-width: 950px; aspect-ratio: 16/9; border: 2px solid var(--v-red); background: #000; position: relative; }
        .close-v { position: absolute; top: -45px; right: 0; background: var(--v-red); color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">VENOM TUBE</div>
    <div style="font-weight: bold;">STATUS: <span style="color:var(--v-red)">OFFICIAL</span></div>
</header>

<nav>
    <div class="nav-item">🏠 GŁÓWNA</div>
    <div class="nav-item">🎬 MOJE FILMY</div>
    <div class="nav-item">🛡️ SKIBIDI PANEL</div>
</nav>

<main class="animate">
    <div class="profile-section">
        <img src="image_8dfd9b.png" class="user-avatar" alt="SkibidiZiom Icon">
        <div class="user-info">
            <h1>SkibidiZiom_rblx</h1>
            <p>@RealSkibidiZiom_rblx</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><h2>107 705</h2><p>WYŚWIETLENIA KANAŁU</p></div>
        <div class="stat-box"><h2>394</h2><p>SUBY</p></div>
    </div>

    <div class="grid">
        <div class="v-card" onclick="openV('5VoQrhNo_s0')">
            <div class="thumb">
                <img src="https://i.ytimg.com/vi/5VoQrhNo_s0/maxresdefault.jpg">
            </div>
            <div class="v-info">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--v-red);"></div>
                <div>
                    <p class="v-title">Poradnik na latanie w Rivals bez cheatów 🔥</p>
                    <p style="color: #666; font-size: 13px; margin-top: 5px;">23 wyświetlenia • 28.03.2026</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="v-modal">
    <div class="video-container">
        <button class="close-v" onclick="closeV()">ZAMKNIJ [X]</button>
        <iframe id="ifr" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
    function openV(id) {
        document.getElementById('ifr').src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('v-modal').style.display = "flex";
    }
    function closeV() {
        document.getElementById('v-modal').style.display = "none";
        document.getElementById('ifr').src = "";
    }
</script>

</body>
</html>
