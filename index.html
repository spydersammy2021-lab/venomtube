        body {

            font-family: 'Impact', 'Segoe UI', sans-serif; 
            margin: 0;

            100% { opacity: 1; transform: scale(1); }
        }
        .app-container { animation: intro 0.8s ease-out; }

        header { 
            background: #000; 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            border-bottom: 4px solid var(--v-red); 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 32px; font-weight: 900; color: var(--v-red); letter-spacing: 2px; }

        .layout { display: flex; }

        nav { 
            width: 260px; 
            background: #000; 
            min-height: 100vh; 
            padding: 40px 20px;
            border-right: 2px solid #111;
        }
        .menu-btn { 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #080808; 
            border: 1px solid #222;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            font-weight: bold;
            color: #555;
        }
        .menu-btn:hover { 
            background: var(--v-red); 
            color: white; 
            box-shadow: 0 0 20px var(--v-red);
            transform: skewX(-10deg);
        }

        main { flex: 1; padding: 40px; }

        .profile-hero { 
            background: linear-gradient(45deg, #111, #000); 
            padding: 50px; 
            border-radius: 0 50px 0 50px; 
            border: 2px solid var(--v-red);
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 50px;
        }
        /* TWOJA IKONKA TUTAJ */
        .my-icon { 
            width: 140px; 
            height: 140px; 
            border-radius: 20px; 
            border: 4px solid var(--v-red); 
            box-shadow: 0 0 40px var(--v-red);
            transform: rotate(-3deg);
            object-fit: cover;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-bottom: 60px; }
        .stat-card { 
            background: #000; 
            padding: 30px; 
            border-left: 10px solid var(--v-red);
            transition: 0.4s;
        }
        .stat-card:hover { background: #111; transform: scale(1.05); }
        .stat-card h2 { font-size: 50px; margin: 0; color: white; }
        .stat-card p { color: var(--v-red); margin: 5px 0 0 0; font-size: 14px; letter-spacing: 3px; }

        .video-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 40px; }
        .v-item { 
            background: var(--v-card); 
            border-radius: 10px; 
            overflow: hidden; 
            border-bottom: 5px solid #222;
            cursor: pointer;
            transition: 0.3s;
        }
        .v-item:hover { border-bottom-color: var(--v-red); transform: translateY(-10px); }
        .v-thumb { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-desc { padding: 25px; }

        #player-box { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 5000; 
            align-items: center; justify-content: center; 
        }
        .iframe-wrap { 
            width: 85%; max-width: 1100px; aspect-ratio: 16/9; 
            border: 5px solid var(--v-red); box-shadow: 0 0 100px var(--v-red);
            position: relative;
        }
        .close-vid { 
            position: absolute; top: -70px; right: 0; 
            background: var(--v-red); color: white; border: none; 
            padding: 15px 40px; font-weight: 900; cursor: pointer; 
        }
    </style>
</head>
