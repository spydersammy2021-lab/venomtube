<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 VENOM TUBE | SkibidiZiom_rblx</title>
    <style>
        :root { --v-blue: #00ccff; --v-black: #050505; }
        body { background-color: var(--v-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Animacja wejścia */
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { background: #000; height: 70px; display: flex; align-items: center; padding: 0 30px; border-bottom: 2px solid var(--v-blue); position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box; }
        nav { width: 230px; background: #080808; height: 100vh; position: fixed; top: 70px; padding: 20px; border-right: 1px solid #222; box-sizing: border-box; }
        main { margin-left: 230px; margin-top: 70px; padding: 30px; }

        /* Twoje Statystyki */
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .s-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; flex: 1; text-align: center; transition: 0.3s; }
        .s-card:hover { border-color: var(--v-blue); transform: scale(1.02); }
        .s-card h2 { margin: 0; color: var(--v-blue); font-size: 30px; text-shadow: 0 0 10px var(--v-blue); }
        .s-card p { margin: 5px 0 0 0; color: #666; font-size: 11px; text-transform: uppercase; font-weight: bold; }

        /* Karty Filmów */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .v-card { background: #0f0f0f; border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.4s; }
        .v-card:hover { border-color: var(--v-blue); transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0, 204, 255, 0.2); }
        .thumb { width: 100%; aspect-ratio: 16/9; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 15px; display: flex; gap: 12px; }
        .av { width: 40px; height: 40px; border-radius: 50%; background: var(--v-blue); border: 2px solid white; flex-shrink: 0; }
        .title { margin: 0; font-size: 16px; font-weight: bold; color: #fff; }
        .meta { color: #777; font-size: 13px; margin-top: 5px; }

        /* Naprawiony Odtwarzacz */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .video-box { width: 90%; max-width: 950px; aspect-ratio: 16/9; border: 2px solid var(--v-blue); border-radius: 10px; overflow: hidden; position: relative; background: #000; }
        .close { position: absolute; top: -45px; right: 0; color: white; background: red; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: 900; letter-spacing: 2px;">VENOM <span style="color:var(--v-blue)">TUBE</span></div>
</header>

<nav>
