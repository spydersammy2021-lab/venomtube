<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKIBIDIZIOM | TITAN RED OFFICIAL</title>
    <style>
        :root { --v-red: #ff0000; --v-bg: #050505; --v-card: #111; }
        
        body { 
            background-color: var(--v-bg); 
            color: white; 
            font-family: 'Segoe UI', 'Impact', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }

        header { 
            background: #000; 
            height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            border-bottom: 4px solid var(--v-red); 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .layout { 
            display: flex; 
            min-height: calc(100vh - 84px);
            width: 100%;
        }

        nav { 
            width: 260px; 
            background: #000; 
            padding: 30px 20px;
            border-right: 1px solid #222;
            flex-shrink: 0;
        }

        .menu-item { 
            padding: 15px; 
            margin-bottom: 10px; 
            background: #0a0a0a; 
            border: 1px solid #222;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-weight: bold;
            color: #ccc;
        }
        .menu-item:hover { background: var(--v-red); color: white; }

        main { 
            flex-grow: 1; 
            padding: 40px; 
            background: var(--v-bg);
            display: flex;
            flex-direction: column;
        }

        .hero { 
            background: linear-gradient(135deg, #111 0%, #000 100%); 
            padding: 50px; 
            border-radius: 20px; 
            border: 2px solid var(--v-red);
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
        }
        .hero img { 
            width: 150px; 
            height: 150px; 
            border-radius: 20px; 
            border: 4px solid var(--v-red); 
            box-shadow: 0 0 30px var(--v-red);
            object-fit: cover;
        }

        .stats-row { 
            display: flex;
            gap: 20px; 
            margin-bottom: 40px;
            width: 100%;
        }
        .stat { 
            background: #000; 
            padding: 30px; 
            border-left: 8px solid var(--v-red);
            flex: 1;
        }
        .stat h2 { font-size: 50px; margin: 0; }
        .stat p { color: var(--v-red); margin-top: 10px; font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        .video-box { 
            width: 450px; 
            background: var(--v-card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-box:hover { border-color: var(--v-red); transform: translateY(-5px); }
        .video-box img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-info { padding: 20px; }

        #video-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); 
            z-index: 2000; 
            align-items: center; 
            justify-content: center; 
        }
        .player-wrap { 
            width: 90%; 
            max-width: 1200px; 
            aspect-ratio: 16/9; 
            border: 4px solid var(--v-red); 
            position: relative;
        }
        .btn-close { 
            position: absolute; top: -60px; right: 0; 
            background: var(--v-red); color: white; border: none; 
            padding: 10px 40px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div style="font-size: 32px; font-weight: 900; color: var(--v-red);">VENOM TUBE</div>
    <div style="background: var(--v-red); color: black; padding: 5px 20px; font-weight: 900; border-radius: 3px;">TITAN V15</div>
</header>

<div class="layout">
    <nav>
        <div class="menu-item">🏠 GŁÓWNA</div>
        <div class="menu-item">🎬 FILMY</div>
        <div class="menu-item" style="color:var(--v-red)">🛡️ PANEL</div>
    </nav>

    <main>
        <div class="hero">
            <img src="channels4_profile.jpg" alt="Profil">
            <div>
                <h1 style="font-size: 55px; margin: 0;">SkibidiZiom_rblx</h1>
                <p style="color: var(--v-red); font-size: 20px; font-weight: bold;">TOP 1 RIVALS POLAND 🇵🇱</p>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat"><h2>107 705</h2><p>WYŚWIETLENIA KANAŁU</p></div>
            <div class="stat"><h2>394</h2><p>SUBSKRYBENCI</p></div>
        </div>

        <div class="video-box" onclick="playVideo('5VoQrhNo_s0')">
            <img src="https://i.ytimg.com/vi/5VoQrhNo_s0/maxresdefault.jpg">
            <div class="video-info">
                <h3 style="margin:0;">Poradnik na latanie w Rivals 🔥</h3>
                
                <p style="color:#888; margin-top: 10px;">31 wyświetleń • Marzec 2026</p>
                </div>
        </div>
    </main>
</div>

<div id="video-overlay">
    <div class="player-wrap">
        <button class="btn-close" onclick="closeVideo()">ZAMKNIJ [X]</button>
        <iframe id="video-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    function playVideo(id) {
        document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + id + "?autoplay=1&rel=0";
        document.getElementById('video-overlay').style.display = "flex";
    }
    function closeVideo() {
        document.getElementById('video-overlay').style.display = "none";
        document.getElementById('video-frame').src = "";
    }
</script>

</body>
</html>
