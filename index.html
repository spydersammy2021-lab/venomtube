<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 DUBAI EDITION | SkibidiZiom_rblx</title>
    <style>
        :root { --d-gold: #ffd700; --d-blue: #00aaff; --d-dark: #050505; }
        
        body { background-color: var(--d-dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }

        /* Animacja wjazdu jak w Dubaju */
        .dubai-fade { animation: dubaiIn 1.2s ease-out; }
        @keyframes dubaiIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 2px solid var(--d-gold); box-sizing: border-box; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 3px; color: var(--d-gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        
        nav { width: 250px; background: rgba(10, 10, 10, 0.8); height: 100vh; position: fixed; top: 80px; padding: 25px; border-right: 1px solid #222; box-sizing: border-box; }
        .nav-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; cursor: pointer; color: #888; transition: 0.3s; font-weight: 600; border: 1px solid transparent; }
        .nav-item:hover { background: rgba(255, 215, 0, 0.1); color: var(--d-gold); border-color: var(--d-gold); }

        main { margin-left: 250px; margin-top: 100px; padding: 40px; }

        /* Statystyki SkibidiZioma */
        .dubai-stats { display: flex; gap: 25px; margin-bottom: 45px; }
        .stat-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); padding: 25px; border-radius: 25px; border: 1px solid #333; flex: 1; text-align: center; position: relative; overflow: hidden; }
        .stat-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--d-gold); }
        .stat-card h2 { margin: 0; color: white; font-size: 35px; }
        .stat-card p { margin: 5px 0 0 0; color: var(--d-gold); font-size: 12px; letter-spacing: 2px; font-weight: bold; }

        /* Karty Filmów */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 35px; }
        .v-card { background: #111; border-radius: 25px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.5s; position: relative; }
        .v-card:hover { transform: translateY(-15px) rotate(1deg); border-color: var(--d-gold); box-shadow: 0 20px 50px rgba(255, 215, 0, 0.2); }
        .thumb { width: 100%; aspect-ratio: 16/9; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 25px; display: flex; gap: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 15px; background: var(--d-blue); border: 2px solid var(--d-gold); flex-shrink: 0; }
        .title { margin: 0; font-size: 18px; font-weight: 900; color: #fff; }
        .meta { color: #888; font-size: 14px; margin-top: 8px; }

        /* Odtwarzacz */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; }
        .video-box { width: 90%; max-width: 1100px; aspect-ratio: 16/9; border: 3px solid var(--d-gold); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 0 80px rgba(255, 215, 0, 0.4); }
        .close { position: absolute; top: -60px; right: 0; color: black; background: var(--d-gold); padding: 10px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; border: none; font-size: 16px; }

        button#sub { background: var(--d-gold); border: none; padding: 12px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        button#sub:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--d-gold); }
    </style>
</head>
<body>

<header>
    <div class="logo">SKIBIDI <span>DUBAI</span></div>
    <button id="sub" onclick="conferti()">ZOSAW SUBA 👑</button>
</header>

<nav>
    <div class="nav-item">💎 VIP PANEL</div>
    <div class="nav-item">🎬 MOJE HITY</div>
    <div class="nav-item">📈 STATYSTYKI</div>
</nav>

<main class="dubai-fade">
    <div class="dubai-stats">
        <div class="stat-card"><h2>107 705</h2><p>TOTAL VIEWS</p></div>
        <div class="stat-card"><h2>394</h2><p>ELITE SUBS</p></div>
        <div class="stat-card"><h2>👑</h2><p>SKIBIDI RANK</p></div>
    </div>

    <div class="grid">
        <div class="v-card" onclick="openDub('5VoQrhNo_s0')">
            <div class="thumb">
                <img src="https://i.ytimg.com/vi/5VoQrhNo_s0/maxresdefault.jpg">
            </div>
            <div class="info">
                <div class="avatar" style="background: url('https://i.imgur.com/your-avatar-here.png') center/cover;"></div>
                <div>
                    <p class="title">RIVALS: UNIKALNA TAKTYKA (NO CHEATS) 🔥</p>
                    <p class="meta">SkibidiZiom_rblx • 23 wyświetlenia<br>PREMIERA ROKU</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="modal">
    <div class="video-box">
        <button class="close" onclick="closeDub()">ZAMKNIJ POKAZ [X]</button>
        <iframe id="ifr" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    function openDub(id) {
        document.getElementById('ifr').src = "https://www.youtube.com/embed/" + id + "?autoplay=1&modestbranding=1";
        document.getElementById('modal').style.display = "flex";
    }
    function closeDub() {
        document.getElementById('modal').style.display = "none";
        document.getElementById('ifr').src = "";
    }
    function conferti() {
        alert("WŁAŚNIE DOŁĄCZYŁEŚ DO MILIONERÓW SKIBIDIZIOMA! 💰✨");
    }
</script>

</body>
</html>
