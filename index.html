<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 VENOM TUBE | SkibidiZiom_rblx OFFICIAL</title>
    <style>
        :root { --v-blue: #00ccff; --v-dark-blue: #0044ff; --v-black: #050505; --v-card: #0f0f0f; }
        
        body { background-color: var(--v-black); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow-x: hidden; }

        /* Modern Header */
        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: white; }
        .logo span { color: var(--v-blue); text-shadow: 0 0 15px var(--v-blue); }
        
        /* Sidebar */
        nav { width: 240px; background: #080808; height: 100vh; position: fixed; top: 70px; padding: 20px; border-right: 1px solid #1a1a1a; box-sizing: border-box; }
        .nav-item { padding: 12px 15px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; color: #aaa; transition: 0.2s; font-weight: 500; }
        .nav-item:hover { background: rgba(0,204,255,0.1); color: white; }
        .nav-item.active { background: rgba(0,204,255,0.15); color: var(--v-blue); font-weight: bold; }

        /* Content */
        main { margin-left: 240px; margin-top: 70px; padding: 40px; }

        /* Banner Twórcy */
        .profile-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; background: linear-gradient(90deg, #111, #050505); padding: 30px; border-radius: 20px; border: 1px solid #222; }
        .p-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--v-blue); box-shadow: 0 0 20px rgba(0,204,255,0.3); }
        .p-info h1 { margin: 0; font-size: 28px; }
        .p-info p { margin: 5px 0 0 0; color: #888; font-size: 14px; }

        /* Video Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .v-card { background: var(--v-card); border-radius: 15px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #1a1a1a; }
        .v-card:hover { transform: translateY(-5px); border-color: var(--v-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
