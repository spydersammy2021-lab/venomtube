<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 VENOM TUBE | SkibidiZiom_rblx</title>
    <style>
        :root { --v-blue: #00ccff; --v-black: #050505; }
        body { background-color: var(--v-black); color: white; font-family: sans-serif; margin: 0; }
        header { background: #000; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--v-blue); position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box; }
        nav { width: 200px; background: #080808; height: 100vh; position: fixed; top: 60px; padding: 20px; border-right: 1px solid #222; }
        main { margin-left: 220px; margin-top: 80px; padding: 20px; }
        .stats { display: flex; gap: 15px; margin-bottom: 30px; }
        .s-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; flex: 1; text-align: center; }
        .s-box h2 { margin: 0; color: var(--v-blue); font-size: 24px; }
        .video-card { background: #111; width: 340px; border-radius: 12px; cursor: pointer; border: 1px solid #222; overflow: hidden; }
        .video-card:hover { border-color: var(--v-blue); }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; }
        .info h3 { margin: 0; font-size: 15px; }
        .info p { color: #888; font-size: 13px; margin: 5px 0 0 0; }
        /* Odtwarzacz FIX */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .p-container { width: 80%; max-width: 800px; aspect-ratio: 16/9; border: 2px solid var(--v-blue); background: #000; }
        .close-p { background: red; color: white; border: none; padding: 10px 20px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: 900;">VENOM <span style="color:var(--v-blue)">TUBE</span></div>
</header>

<nav>
    <p style="color:var(--v-blue)">🏠 Główna</p>
    <p>🎬 Moje filmy</p>
    <p>🏆 Skibidi Panel</p>
</nav>

<main>
    <div class="stats">
        <div class="s-box"><h2>107 705</h2><p>WYŚWIETLENIA</p></div>
        <div class="s-box"><h2>394</h2><p>SUBSKRYBCJE</p></div>
    </div>

    <div class="video-card" onclick="playVid()">
        <div class="thumb">
            <img src="https://i.ytimg.com/vi/5VoQrhNo_s0/maxresdefault.jpg">
        </div>
        <div class="info">
            <h3>Poradnik na latanie w Rivals 🔥</h3>
            <p>SkibidiZiom_rblx<br>23 wyświetlenia • 2h temu</p>
        </div>
    </div>
</main>

<div id="player-overlay">
    <button class="close-p" onclick="stopVid()">ZAMKNIJ FILM [X]</button>
    <div class="p-container">
        <iframe id="main-ifr" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
    function playVid() {
        // Najbezpieczniejszy link do embedowania
        document.getElementById('main-ifr').src = "https://www.youtube.com/embed/5VoQrhNo_s0?autoplay=1";
        document.getElementById('player-overlay').style.display = "flex";
    }
    function stopVid() {
        document.getElementById('player-overlay').style.display = "none";
        document.getElementById('main-ifr').src = "";
    }
</script>

</body>
</html>
