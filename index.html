<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKIBIDIZIOM | TITAN RED</title>
    <style>
        body { background: #050505; color: white; font-family: 'Impact', sans-serif; margin: 0; }
        .header { background: #000; padding: 20px; border-bottom: 4px solid red; text-align: center; }
        .container { padding: 40px; max-width: 1000px; margin: auto; }

        .stat-card h2 { font-size: 50px; margin: 0; }
        .stat-card p { color: red; margin: 5px 0 0 0; letter-spacing: 2px; }
        .v-card { width: 400px; background: #111; margin-top: 40px; border-radius: 10px; overflow: hidden; border-bottom: 5px solid red; cursor: pointer; transition: 0.3s; }
        .v-card:hover { transform: translateY(-10px); }
        .v-card img { width: 100%; display: block; }
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    </div>

    <div class="v-card" onclick="document.getElementById('player').style.display='flex'">

</html>
