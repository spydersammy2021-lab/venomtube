    <style>
        :root { --v-blue: #00ccff; --v-black: #050505; --v-card: #0f0f0f; }
        body { background-color: var(--v-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }

        /* Statystyki SkibidiZioma */
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; flex: 1; text-align: center; }

        .stat-card p { margin: 5px 0 0 0; color: #666; font-size: 12px; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .v-card { background: var(--v-card); border-radius: 15px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #1a1a1a; }
        .v-card:hover { transform: translateY(-5px); border-color: var(--v-blue); box-shadow: 0 0 20px rgba(0,204,255,0.2); }
        .thumb { width: 100%; aspect-ratio: 16/9; position: relative; }
