<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>🐍 VENOM TUBE - PRESTIGE</title>
    <style>
        :root { --main-red: #ff0000; --bg-dark: #050505; --card-bg: #121212; }
        
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }

        /* Neonowy pasek postępu na samej górze */
        .top-line { height: 3px; background: linear-gradient(90deg, transparent, var(--main-red), transparent); width: 100%; position: fixed; top: 0; z-index: 1000; box-shadow: 0 0 15px var(--main-red); }

        /* Header jak w 2026 roku */
        header { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); height: 70px; display: flex; align-items: center; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 900; border-bottom: 1px solid #222; }
        .logo { color: var(--main-red); font-size: 28px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .logo:hover { text-shadow: 0 0 20px var(--main-red); transform: scale(1.05); }

        /* Sidebar z efektem Glassmorphism */
        nav { width: 220px; background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(15px); height: 100vh; position: fixed; top: 70px; padding: 20px; border-right: 1px solid #1a1a1a; }
        .nav-link { padding: 12px 20px; margin-bottom: 10px; cursor: pointer; border-radius: 12px; transition: 0.3s; color: #888; font-weight: 600; display: flex; align-items: center; }
        .nav-link:hover { background: rgba(255, 0, 0, 0.1); color: white; box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.2); }
        .nav-link.active { color: var(--main-red); border-left: 4px solid var(--main-red); background: rgba(255, 0, 0, 0.05); }

        /* Główny kontener */
        main { margin-left: 270px; margin-top: 100px; padding: 20px; animation: fadeIn 1.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Statystyki */
        .stats-box { background: #0f0f0f; border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 40px; display: flex; justify-content: space-around; position: relative; overflow: hidden; }
        .stats-box::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,0,0,0.05) 0%, transparent 70%); }
        .stat-item { text-align: center; position: relative; }
        .stat-item span { display: block; font-size: 28px; font-weight: 900; color: var(--main-red); text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .stat-item small { color: #555; text-transform: uppercase; letter-spacing: 1px; }

        /* Siatka filmów */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; transition: 0.5s; position: relative; border: 1px solid #222; }
        .card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--main-red); box-shadow: 0 15px 40px rgba(255, 0, 0, 0.3); }

        .thumb-container { position: relative; width: 100%; height: 180px; overflow: hidden; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
