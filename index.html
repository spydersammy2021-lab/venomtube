<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00 VENOM | TITAN V25: SUPERNOVA</title>
    <style>
        /* --- BAZA I ZMIENNE GORĄCEGO STYLU --- */
        :root { 
            --v-red: #ff0000; 
            --v-red-glow: rgba(255, 0, 0, 0.6);
            --v-bg: #000000; 
            --v-panel: rgba(5, 5, 5, 0.85);
            --v-card: rgba(10, 10, 10, 0.9);
            --v-text: #ffffff;
            --v-text-dark: #aaaaaa;
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); /* KLUCZ DO NAJLEPSZYCH ANIMACJI */
        }
        
        body { 
            background-color: var(--v-bg); 
            color: var(--v-text); 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
            width: 100%;
            display: flex;
            flex-direction: column;
            /* ANIMOWANE TŁO GALAXY/SUPERNOVA */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: backgroundStarAnimation 100s linear infinite;
        }

        /* --- NAJLEPSZE ANIMACJE KOD --- */
        @keyframes backgroundStarAnimation {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 590px 610px, 680px 820px; }
        }

        @keyframes neonBreathe {
            0%, 100% { box-shadow: 0 0 15px var(--v-red-glow), 0 0 5px var(--v-red); }
            50% { box-shadow: 0 0 30px var(--v-red-glow), 0 0 10px var(--v-red); }
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
            50% { text-shadow: 0 0 20px rgba(255, 0, 0, 0.9), 0 0 10px rgba(255, 255, 255, 0.3); }
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- NAGŁÓWEK SUPERNOVA --- */
        header { 
            background: var(--v-panel); 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 60px; 
            border-bottom: 3px solid var(--v-red); 
            animation: neonBreathe 4s infinite; /* ODYCHAJĄCY NEON */
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px); /* EFEKT SZKŁA */
        }

        .header-logo {
            font-size: 40px; font-weight: 900; color: var(--v-red);
            letter-spacing: -2px; font-family: 'Impact', sans-serif;
            animation: textGlow 3s infinite;
        }
        .header-logo span { color: white; transition: var(--transition-smooth); }
        .header-logo:hover span { color: var(--v-red); text-shadow: 0 0 20px var(--v-red); }

        .version-badge {
            background: rgba(255, 0, 0, 0.1);
            color: var(--v-red);
            padding: 8px 25px;
            font-weight: 900; font-size: 13px;
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            transition: var(--transition-smooth);
        }
        .version-badge:hover { background: var(--v-red); color: white; transform: rotate(-3deg); box-shadow: 0 0 20px var(--v-red); }

        .layout { display: flex; min-height: calc(100vh - 93px); width: 100%; }

        /* --- PANEL BOCZNY PREMIUM --- */
        nav { 
            width: 300px; 
            background: var(--v-panel); 
            padding: 60px 25px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .menu-item { 
            padding: 18px 25px; margin-bottom: 15px; 
            background: rgba(20, 20, 20, 0.5); border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 15px; cursor: pointer;
            transition: var(--transition-smooth);
            text-align: left; font-weight: 700; color: var(--v-text-dark);
            text-transform: uppercase; letter-spacing: 1.5px; font-size: 14px;
            position: relative; overflow: hidden;
        }

        /* EFEKT CZĄSTECZEK PRZY HOVER W MENU */
        .menu-item::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 60%);
            transform: translate(-50%, -50%) scale(0); opacity: 0;
            transition: var(--transition-smooth);
        }

        .menu-item:hover { 
            background: white; color: black; 
            transform: translateX(15px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
            border-color: white;
        }
        .menu-item:hover::after { transform: translate(-50%, -50%) scale(2); opacity: 0.1; }

        #adminBtn {
            margin-top: 70px; border-color: var(--v-red);
            color: var(--v-red); font-weight: 900;
            text-shadow: 0 0 10px var(--v-red);
            background: rgba(255, 0, 0, 0.05);
        }
        #adminBtn:hover {
            background: var(--v-red); color: white;
            box-shadow: 0 0 40px var(--v-red), 0 0 10px var(--v-red-glow);
            text-shadow: none;
        }

        /* --- GŁÓWNA SEKCJA SUPERNOVA --- */
        main { 
            flex-grow: 1; padding: 60px; 
            background: radial-gradient(circle at top right, rgba(30, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.2) 60%);
            perspective: 1500px; /* POTRZEBNE DO 3D HOVER */
        }

        .hero { 
            background: rgba(10, 10, 10, 0.8); padding: 70px; border-radius: 35px; 
            border: 1px solid rgba(255, 0, 0, 0.2); 
            display: flex; align-items: center; gap: 60px; margin-bottom: 60px; width: 100%;
            box-sizing: border-box; position: relative;
            backdrop-filter: blur(20px);
            animation: fadeSlideIn 1s var(--transition-smooth) forwards;
            transform-style: preserve-3d; /* 3D DLA HERO */
            transition: var(--transition-smooth);
        }
        
        .hero:hover {
            box-shadow: 0 30px 60px rgba(255, 0, 0, 0.2);
            border-color: rgba(255, 0, 0, 0.4);
        }

        .hero img { 
            width: 180px; height: 180px; border-radius: 30px; 
            border: 5px solid var(--v-red); 
            box-shadow: 0 0 50px var(--v-red-glow); object-fit: cover;
            background: #111;
            transition: var(--transition-smooth);
            transform: translateZ(50px); /* ODSTAJE W 3D */
        }
        .hero:hover img { transform: translateZ(80px) rotate(-5deg); box-shadow: 0 0 70px var(--v-red); }

        .hero-text { transform: translateZ(30px); }
        .hero-text h1 { 
            font-size: 80px; margin: 0; font-family: 'Impact', sans-serif; 
            letter-spacing: 2px; color: white; 
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            transition: var(--transition-smooth);
        }
        .hero-text p { 
            color: var(--v-red); font-size: 26px; font-weight: 800; margin-top: 5px; 
            text-transform: uppercase; letter-spacing: 3px;
        }
        .hero:hover h1 { text-shadow: 0 0 40px var(--v-red); }

        /* --- STATYSTYKI PŁYNNE KARTY --- */
        .stats-row { 
            display: flex; gap: 30px; margin-bottom: 60px; width: 100%; 
            animation: fadeSlideIn 1.2s var(--transition-smooth) forwards;
        }
        .stat { 
            background: var(--v-card); padding: 40px; 
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 6px solid var(--v-red);
            flex: 1; transition: var(--transition-smooth);
            transform-style: preserve-3d;
            position: relative; overflow: hidden;
        }
        
        /* EFEKT BŁYSKU PRZY HOVER W STATYSTYKACH */
        .stat::after {
            content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: var(--transition-smooth);
        }

        .stat:hover { 
            transform: translateY(-15px) rotateX(10deg); 
            background: #111; border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(255, 0, 0, 0.15);
        }
        .stat:hover::after { top: -50%; left: -50%; }

        .stat h2 { 
            font-size: 65px; margin: 0; font-family: 'Impact', sans-serif; color: white;
            transition: var(--transition-smooth);
            transform: translateZ(40px);
        }
        .stat p { 
            color: var(--v-text-dark); margin-top: 10px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 15px;
            transition: var(--transition-smooth);
            transform: translateZ(20px);
        }
        .stat:hover h2 { color: var(--v-red); text-shadow: 0 0 30px var(--v-red); }
        .stat:hover p { color: white; }

        /* --- FILM 3D CARD ANIMACJA --- */
        .video-section-title {
            margin-bottom: 40px; letter-spacing: 3px; font-size: 30px; 
            color: white; font-weight: 900; text-transform: uppercase;
            animation: fadeSlideIn 1.4s var(--transition-smooth) forwards;
        }

        .video-box { 
            width: 550px; background: var(--v-card); border-radius: 25px; 
            overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer;
            transition: var(--transition-smooth);
            animation: fadeSlideIn 1.6s var(--transition-smooth) forwards;
            position: relative;
            transform-style: preserve-3d;
        }
        
        .video-box:hover { 
            border-color: var(--v-red); 
            transform: translateY(-20px) rotateY(10deg) scale(1.03); 
            box-shadow: 0 30px 60px rgba(255, 0, 0, 0.3);
        }
        
        .video-box img { 
            width: 100%; aspect-ratio: 16/9; object-fit: cover; 
            transition: var(--transition-smooth);
        }
        .video-box:hover img { transform: scale(1.05); }

        .video-info { padding: 30px; transition: var(--transition-smooth); transform: translateZ(30px); }
        .video-info h3 { margin: 0; font-size: 24px; color: white; font-weight: 800; transition: var(--transition-smooth); }
        .video-info p { 
            color: var(--v-text-dark); margin-top: 12px; font-size: 16px; 
            font-weight: 600; transition: var(--transition-smooth);
        }
        
        .video-box:hover .video-info h3 { color: var(--v-red); text-shadow: 0 0 20px var(--v-red); }
        .video-box:hover .video-info p { color: white; }

        /* --- ODTWARZACZ NAJLEPSZA ANIMACJA ZNOSZENIA Z BLIK --- */
        #video-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.98); 
            z-index: 2000; align-items: center; justify-content: center; 
            backdrop-filter: blur(20px);
            opacity: 0; transition: opacity 0.6s ease;
        }
        
        #video-overlay.open { opacity: 1; display: flex; }

        .player-wrap { 
            width: 90%; max-width: 1300px; aspect-ratio: 16/9; 
            border: 4px solid var(--v-red); position: relative;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 100px var(--v-red-glow);
            transform: scale(0.8) translateY(50px);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #video-overlay.open .player-wrap { transform: scale(1) translateY(0); }

        .btn-close { 
            position: absolute; top: -80px; right: 0; 
            background: white; color: black; border: none; 
            padding: 15px 50px; font-weight: 900; cursor: pointer; 
            border-radius: 50px; text-transform: uppercase; letter-spacing: 2px;
            transition: var(--transition-smooth);
        }
        .btn-close:hover { background: var(--v-red); color: white; box-shadow: 0 0 30px var(--v-red); transform: translateY(-5px); }

    </style>
</head>
<body>

<header>
    <div class="header-logo">00<span>VENOM</span></div>
    <div class="version-badge">TITAN V25: SUPERNOVA / 39 UP</div>
</header>

<div class="layout">
    <nav>
        <div class="menu-item">🏠 Główna</div>
        <div class="menu-item">🎬 Moje Filmy</div>
        <div class="menu-item">🏆 Osiągnięcia</div>
        <div class="menu-item" id="adminBtn" onclick="secureLogin()">🛡️ Panel Admina</div>
    </nav>

    <main>
        <div class="hero">
            <img src="pro.png" alt=""> 
            <div class="hero-text">
                <h1>00 Venom</h1>
                <p>TOP 1 RIVALS POLAND 🇵🇱</p>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat"><h2>107 705</h2><p>Wyświetlenia Kanału</p></div>
            <div class="stat"><h2>394</h2><p>Subskrybenci</p></div>
        </div>

        <h2 class="video-section-title">OSTATNIA PRODUKCJA</h2>

        <div class="video-box" onclick="playVideo('5VoQrhNo_s0')">
            <img src="https://i.ytimg.com/vi/5VoQrhNo_s0/maxresdefault.jpg">
            <div class="video-info">
                <h3>Poradnik na latanie w Rivals 🔥</h3>
                <p>39 wyświetleń • 2026</p>
            </div>
        </div>
    </main>
</div>

<div id="video-overlay">
    <div class="player-wrap">
        <button class="btn-close" onclick="closeVideo()">Zamknij</button>
        <iframe id="video-frame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    const videoOverlay = document.getElementById('video-overlay');
    const videoFrame = document.getElementById('video-frame');

    function playVideo(id) {
        videoFrame.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&rel=0&modestbranding=1";
        videoOverlay.style.display = 'flex'; // Ustaw display przed dodaniem klasy
        setTimeout(() => videoOverlay.classList.add('open'), 10); // Małe opóźnienie dla animacji
    }
    function closeVideo() {
        videoOverlay.classList.remove('open');
        setTimeout(() => {
            videoOverlay.style.display = 'none'; // Ukryj po zakończeniu animacji
            videoFrame.src = "";
        }, 600); // Czas trwania animacji CSS
    }

    // Zamknij po kliknięciu poza playerem
    videoOverlay.addEventListener('click', (e) => {
        if (e.target === videoOverlay) closeVideo();
    });

    let loginAttempts = 0;
    function secureLogin() {
        let pass = prompt("SKANOWANIE BIOMETRYCZNE WYMAGANE. Podaj klucz dostępu:");
        if (pass === "skibidimasło") {
            alert("DOSTĘP PRZYZNANY. Witaj 00 Venom.");
            window.location.href = "https://studio.youtube.com/";
        } else {
            loginAttempts++;
            alert("ALARM! Błędny klucz. Próba: " + loginAttempts + "/3. Zawiadamiam Skibidi Intelligence...");
            if(loginAttempts >= 3) {
                alert("SYSTEM ZABLOKOWANY. Procedura oczyszczania: 60 sek.");
                const btn = document.getElementById('adminBtn');
                btn.style.opacity = '0.2';
                btn.style.pointerEvents = 'none';
                setTimeout(() => { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; loginAttempts = 0; }, 60000);
            }
        }
    }
</script>

</body>
</html>
