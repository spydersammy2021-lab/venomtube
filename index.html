<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 SKIBIDIZIOM | TITAN RED V13</title>
    <style>
        :root { --v-red: #ff0000; --v-bg: #050505; --v-card: #111; }
        
        body { 
            background-color: var(--v-bg) !important; 
            color: white; 
            font-family: 'Impact', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .main-content { animation: fadeIn 0.6s ease-out; }

        header { 
            background: #000; 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            border-bottom: 4px solid var(--v-red); 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .layout { display: flex; min-height: calc(100vh - 94px); }

        nav { 
            width: 240px; 
            background: #000; 
            padding: 30px 15px;
            border-right: 1px solid #222;
        }

        .menu-item { 
            padding: 15px; 
            margin-bottom: 10px; 
            background: #0a0a0a; 
            border: 1px solid #222;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            color: #888;
        }
        .menu-item:hover { 
            background: var(--v-red); 
            color: white; 
            transform: scale(1.02);
        }

        main { flex: 1; padding: 40px; }

        .hero { 
            background: linear-gradient(135deg, #111 0%, #000 100%); 
            padding: 40px; 
            border-radius: 20px; 
            border: 2px solid var(--v-red);
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        .hero img { 
            width: 130px; 
            height: 130px; 
            border-radius: 15px; 
            border: 3px solid var(--v-red); 
            box-shadow: 0 0 25px var(--v-red);
            object-fit: cover;
        }

        .stats-row { display: flex; gap: 20px; margin-bottom: 40px; }
        .stat { 
            background: #000; 
            flex: 1; 
            padding: 25px; 
            border-left: 6px solid var(--v-red);
        }
        .stat h2 { font-size: 45px; margin: 0; }
        .stat p { color: var(--v-red); margin: 5px 0 0 0; letter-spacing: 2px; font-size: 14px; }

        .video-box { 
            width: 400px; 
            background: var(--v-card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-box:hover { 
            border-color: var(--v-red);
            transform: translateY(-5px);
        }
        .video-box img { width: 100%; display: block; }
        .video-info { padding: 20px; }
